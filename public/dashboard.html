<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>OpsPilot · Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    try { if (localStorage.getItem('sentinel.theme') === 'light') document.documentElement.setAttribute('data-theme', 'light'); } catch (e) {}
  </script>
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
</head>
<body>
  <div class="app">
    <div id="sidebar-root"></div>

    <main>
      <header class="topbar sticky" data-reveal>
        <div class="title-block">
          <div class="eyebrow">CONSOLE · OPERATIONS</div>
          <h1 class="serif">Operational <em style="color:var(--ember)">insights</em>.</h1>
          <p class="muted" style="margin-top:0.25rem; font-size:0.92rem;" id="now-line"></p>
        </div>
        <div class="actions">
          <div class="search">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input id="searchInput" placeholder="Search incidents, services, owners…" />
            <kbd>/</kbd>
          </div>
          <a href="/new.html" class="btn btn-primary btn-magnetic ripple">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            New incident
          </a>
        </div>
      </header>

      <!-- KPI strip -->
      <section class="kpi-grid" id="kpiGrid" aria-label="Key indicators" data-reveal>
        <div class="kpi skel" style="height:130px"></div>
        <div class="kpi skel" style="height:130px"></div>
        <div class="kpi skel" style="height:130px"></div>
        <div class="kpi skel" style="height:130px"></div>
      </section>

      <!-- Analytics + Activity row -->
      <section class="split-2 mb-3" id="analytics" data-reveal>
        <div class="card hoverable spotlight" style="padding:1.4rem 1.5rem;">
          <div class="row" style="justify-content: space-between; align-items: baseline; margin-bottom: 0.5rem;">
            <div>
              <div class="eyebrow">VOLUME · 12-WEEK TREND</div>
              <h3 class="serif" style="margin-top:0.25rem; font-size:1.5rem;">Incidents created &amp; resolved</h3>
            </div>
            <div class="dim mono tabular" id="trendTotal">—</div>
          </div>
          <div class="trend-strip" id="trendStrip"></div>
          <div id="trendChart" style="position:relative; height: 240px;"></div>
          <div class="trend-legend" aria-label="Chart legend">
            <span class="leg-item"><span class="leg-swatch leg-p1"></span>P1</span>
            <span class="leg-item"><span class="leg-swatch leg-p2"></span>P2</span>
            <span class="leg-item"><span class="leg-swatch leg-p2-low"></span>P2-Low</span>
            <span class="leg-item"><span class="leg-swatch leg-p3"></span>P3</span>
            <span class="leg-sep"></span>
            <span class="leg-item"><span class="leg-line"></span>Resolved</span>
          </div>
        </div>
        <div class="card hoverable spotlight" id="severityCard" style="padding:1.4rem 1.5rem;">
          <div class="row" style="justify-content: space-between; align-items: baseline; margin-bottom: 0.75rem;">
            <div>
              <div class="eyebrow">SEVERITY · CURRENT</div>
              <h3 class="serif" style="margin-top:0.25rem; font-size:1.5rem;">By priority</h3>
            </div>
            <div class="dim mono tabular" id="severityTotal">—</div>
          </div>
          <div id="severityRows"></div>
        </div>
      </section>

      <!-- Incidents table + filters -->
      <section id="incidents-table" data-reveal>
        <div class="row mb-2" style="justify-content: space-between;">
          <div>
            <div class="eyebrow">QUEUE</div>
            <h2 class="serif">Incident timeline</h2>
          </div>
          <div class="row gap-2">
            <button class="btn btn-sm ripple" id="exportBtn">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Export JSON
            </button>
          </div>
        </div>

        <div class="filters" id="filters">
          <button class="filter-pill active" data-filter="state" data-value="">All states</button>
          <button class="filter-pill" data-filter="state" data-value="Live">Live</button>
          <button class="filter-pill" data-filter="state" data-value="RCA in Progress">RCA in progress</button>
          <button class="filter-pill" data-filter="state" data-value="RCA Submitted">RCA submitted</button>
          <button class="filter-pill" data-filter="state" data-value="On Hold">On hold</button>
          <button class="filter-pill" data-filter="state" data-value="Resolved">Resolved</button>
          <span style="width:1px;background:var(--border);margin:0 0.4rem"></span>
          <button class="filter-pill active" data-filter="severity" data-value="">All severity</button>
          <button class="filter-pill" data-filter="severity" data-value="P1">P1</button>
          <button class="filter-pill" data-filter="severity" data-value="P2">P2</button>
          <button class="filter-pill" data-filter="severity" data-value="P2-Low">P2-Low</button>
          <button class="filter-pill" data-filter="severity" data-value="P3">P3</button>
        </div>

        <div class="table-wrap spotlight" style="--spot-size: 600px; --spot-color: rgba(255,122,71,0.08);">
          <table class="incidents" aria-label="Incidents">
            <thead>
              <tr>
                <th style="width: 110px;">ID</th>
                <th>Incident</th>
                <th style="width: 110px;">Severity</th>
                <th style="width: 170px;">State</th>
                <th style="width: 150px;">Owner</th>
                <th style="width: 140px;">Updated</th>
              </tr>
            </thead>
            <tbody id="incidentsBody">
              <tr><td colspan="6" style="padding:0">
                <div style="padding:1.5rem; display:flex; flex-direction:column; gap:0.6rem;">
                  <div class="skel" style="height:18px"></div>
                  <div class="skel" style="height:18px; width:90%"></div>
                  <div class="skel" style="height:18px; width:84%"></div>
                </div>
              </td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- Recent activity -->
      <section class="mt-3" id="activity" data-reveal>
        <div class="eyebrow">PULSE</div>
        <h2 class="serif mb-2">Recent activity</h2>
        <div class="card hoverable spotlight cv-auto" style="padding: 1.2rem 1.5rem;">
          <div id="activityList" class="timeline">
            <div class="skel" style="height: 12px; margin-bottom: 0.5rem;"></div>
            <div class="skel" style="height: 12px; width: 84%; margin-bottom: 0.5rem;"></div>
            <div class="skel" style="height: 12px; width: 78%;"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <style>
    /* Sticky topbar sits above content */
    .topbar.sticky { background: transparent; }
    .app, main { position: relative; z-index: 1; }

    /* KPI inner enhancement */
    .kpi {
      transition: transform 0.5s var(--easing), border-color 0.5s var(--easing), box-shadow 0.5s var(--easing);
    }
    .kpi:hover { border-color: var(--border-strong); }
    .kpi .label { display: flex; align-items: center; gap: 0.4rem; }
    .kpi .icon-chip {
      display: inline-grid; place-items: center;
      width: 22px; height: 22px; border-radius: 6px;
      background: rgba(255,122,71,0.08);
      color: var(--ember);
      border: 1px solid rgba(255,122,71,0.18);
    }

    /* ===== Trend chart (stacked bars + resolved line) ===== */
    .trend-strip {
      display: flex;
      gap: 1rem;
      padding: 0.55rem 0 0.85rem;
      margin-bottom: 0.4rem;
      border-bottom: 1px dashed var(--border);
      flex-wrap: wrap;
    }
    .trend-stat {
      display: flex; flex-direction: column;
      gap: 0.2rem;
      min-width: 92px;
    }
    .trend-stat .ts-label {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .trend-stat .ts-val {
      font-family: var(--font-mono);
      font-size: 0.88rem;
      color: var(--text);
      font-feature-settings: 'tnum';
    }

    #trendChart .t-axis {
      font-family: var(--font-mono);
      font-size: 10px;
      fill: var(--text-dim);
      letter-spacing: 0.06em;
    }
    #trendChart .t-bar {
      transform: scaleY(0);
      transform-origin: bottom;
      transform-box: fill-box;
      transition: transform 0.7s var(--easing), filter 0.2s var(--easing);
      transition-delay: var(--bar-delay, 0ms);
    }
    #trendChart .t-bar.in { transform: scaleY(1); }
    #trendChart .t-bar-p1 { fill: url(#bar-p1); }
    #trendChart .t-bar-p2 { fill: url(#bar-p2); }
    #trendChart .t-bar-p2-low { fill: url(#bar-p2-low); }
    #trendChart .t-bar-p3 { fill: url(#bar-p3); }
    #trendChart .t-bar-p4 { fill: url(#bar-p4); }
    #trendChart .t-hot { cursor: pointer; }
    #trendChart .t-hot:hover ~ .t-bar { filter: brightness(1.05); }

    .t-tooltip {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      min-width: 170px;
      max-width: 240px;
      background: var(--surface-strong);
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      padding: 0.65rem 0.8rem;
      box-shadow: var(--shadow-2);
      backdrop-filter: blur(12px);
      opacity: 0;
      transform: scale(0.96);
      transform-origin: top left;
      transition: opacity 0.15s var(--easing), transform 0.15s var(--easing);
      z-index: 5;
    }
    .t-tooltip.show { opacity: 1; transform: scale(1); }
    .t-tooltip .tt-head {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .t-tooltip .tt-head strong { color: var(--text); font-weight: 600; letter-spacing: 0.02em; text-transform: none; }
    .t-tooltip .tt-total {
      font-family: var(--font-display);
      font-size: 1rem;
      color: var(--text);
      margin: 0.2rem 0 0.4rem;
    }
    .t-tooltip .tt-list { display: flex; flex-direction: column; gap: 0.2rem; }
    .t-tooltip .tt-row {
      display: grid;
      grid-template-columns: 12px 1fr auto;
      gap: 0.5rem;
      align-items: center;
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--text-muted);
    }
    .t-tooltip .tt-row .tt-val { color: var(--text); font-feature-settings: 'tnum'; }
    .t-tooltip .tt-sev { width: 10px; height: 10px; border-radius: 3px; }
    .t-tooltip .tt-sev-p1 { background: linear-gradient(180deg, #FF8A8E, #FF5A5F); }
    .t-tooltip .tt-sev-p2 { background: linear-gradient(180deg, #FFCE6B, #FF9D45); }
    .t-tooltip .tt-sev-p2-low { background: linear-gradient(180deg, #FFE08A, #E5C46B); }
    .t-tooltip .tt-sev-p3 { background: linear-gradient(180deg, #7AC7FF, #0078D4); }
    .t-tooltip .tt-sev-p4 { background: linear-gradient(180deg, #7AC7FF, #0078D4); }
    .t-tooltip .tt-empty { color: var(--text-dim); font-size: 0.78rem; }

    .trend-legend {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      padding-top: 0.7rem;
      margin-top: 0.6rem;
      border-top: 1px dashed var(--border);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-muted);
    }
    .trend-legend .leg-item { display: inline-flex; align-items: center; gap: 0.4rem; }
    .trend-legend .leg-swatch { width: 10px; height: 10px; border-radius: 2px; }
    .trend-legend .leg-p1 { background: linear-gradient(180deg, #FF8A8E, #FF5A5F); }
    .trend-legend .leg-p2 { background: linear-gradient(180deg, #FFCE6B, #FF9D45); }
    .trend-legend .leg-p2-low { background: linear-gradient(180deg, #FFE08A, #E5C46B); }
    .trend-legend .leg-p3 { background: linear-gradient(180deg, #7AC7FF, #0078D4); }
    .trend-legend .leg-p4 { background: linear-gradient(180deg, #7AC7FF, #0078D4); }
    .trend-legend .leg-line {
      width: 18px; height: 0;
      border-top: 2px dashed var(--mint);
    }
    .trend-legend .leg-sep {
      width: 1px; height: 12px;
      background: var(--border-strong);
    }

    /* Severity row enhancement */
    .sev-row {
      display: grid; grid-template-columns: 70px 1fr 50px;
      align-items: center; gap: 0.85rem;
      padding: 0.65rem 0;
      border-bottom: 1px dashed var(--border);
    }
    .sev-row:last-child { border-bottom: 0; }
    .sev-track {
      height: 8px; border-radius: 999px;
      background: rgba(255,255,255,0.04);
      overflow: hidden;
      position: relative;
    }
    .sev-fill {
      height: 100%; width: 0;
      transition: width 1.1s cubic-bezier(.22,1,.36,1);
      border-radius: 999px;
      position: relative;
    }
    .sev-fill::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      transform: translateX(-100%);
      animation: shimmer 2.6s ease-in-out infinite;
    }

    /* Activity item animation */
    .timeline .ev { opacity: 0; transform: translateX(-6px); animation: ev-in 0.5s var(--easing) forwards; }
    .timeline .ev:nth-child(1) { animation-delay: 0.05s; }
    .timeline .ev:nth-child(2) { animation-delay: 0.10s; }
    .timeline .ev:nth-child(3) { animation-delay: 0.15s; }
    .timeline .ev:nth-child(4) { animation-delay: 0.20s; }
    .timeline .ev:nth-child(5) { animation-delay: 0.25s; }
    .timeline .ev:nth-child(6) { animation-delay: 0.30s; }
    .timeline .ev:nth-child(7) { animation-delay: 0.35s; }
    .timeline .ev:nth-child(8) { animation-delay: 0.40s; }
    @keyframes ev-in { to { opacity: 1; transform: translateX(0); } }

    /* Search expand on focus */
    .search {
      transition: min-width 0.4s var(--easing);
    }
    .search:focus-within { min-width: 360px; }
    .search input { transition: all 0.3s var(--easing); }
    .search input:focus { box-shadow: 0 0 0 4px rgba(255,122,71,0.10), 0 0 30px -8px rgba(255,122,71,0.4); }

    /* Table row reveal */
    table.incidents tbody tr {
      opacity: 0;
      transform: translateY(6px);
    }
    table.incidents tbody tr.row-in {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.45s var(--easing), transform 0.45s var(--easing);
    }
  </style>

  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/motion.js" defer></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
